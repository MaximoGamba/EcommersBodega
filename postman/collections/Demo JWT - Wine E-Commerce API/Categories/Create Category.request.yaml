$kind: http-request
name: Create Category
method: POST
url: '{{baseUrl}}/categories'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "description": "Vinos Tintos"
    }
