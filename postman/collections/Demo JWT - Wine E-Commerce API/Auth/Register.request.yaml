$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/api/v1/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "firstname": "John",
      "lastname": "Doe",
      "email": "john.doe@example.com",
      "password": "password123",
      "role": "USER"
    }
