$kind: http-request
name: List Wines
method: GET
url: '{{baseUrl}}/vinos'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
queryParams:
  - key: name
    value: ''
    disabled: true
  - key: minPrice
    value: ''
    disabled: true
  - key: maxPrice
    value: ''
    disabled: true
  - key: year
    value: ''
    disabled: true
  - key: colorId
    value: ''
    disabled: true
  - key: cepaId
    value: ''
    disabled: true
  - key: azucarId
    value: ''
    disabled: true
  - key: crianzaId
    value: ''
    disabled: true
  - key: elaboracionId
    value: ''
    disabled: true
  - key: medidaId
    value: ''
    disabled: true
  - key: page
    value: '0'
    disabled: false
  - key: size
    value: '20'
    disabled: false
  - key: sortBy
    value: id
    disabled: false
  - key: direction
    value: ASC
    disabled: false
