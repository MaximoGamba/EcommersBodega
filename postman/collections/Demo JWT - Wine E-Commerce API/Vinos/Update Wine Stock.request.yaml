$kind: http-request
name: Update Wine Stock
method: PUT
url: '{{baseUrl}}/vinos/{{wineId}}/stock'
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "stock": 150
    }
