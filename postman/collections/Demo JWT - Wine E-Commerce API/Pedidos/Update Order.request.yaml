$kind: http-request
name: Update Order
method: PUT
url: '{{baseUrl}}/pedidos/{{pedidoId}}'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "status": "CONFIRMED",
      "total": 3000.00
    }
