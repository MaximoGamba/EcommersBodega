$kind: http-request
name: Create Order
method: POST
url: '{{baseUrl}}/pedidos'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "userId": null,
      "items": [
        {
          "wineId": 1,
          "quantity": 2
        }
      ]
    }
